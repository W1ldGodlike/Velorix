name: ci

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Windows engines (bin/)
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-flux-engines-${{ hashFiles('scripts/prepare-engines-win.mjs', 'Data/trusted_hashes.json') }}
          restore-keys: |
            ${{ runner.os }}-flux-engines-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Check (lint + typecheck + tests + secrets)
        run: npm run check

      - name: Prepare Windows engines (CI smoke)
        run: npm run engines:prepare:win

      - name: Verify bundled engines (presence + optional SHA256)
        run: npm run engines:verify-bundled

      - name: Build
        run: npm run build

      - name: Packaging smoke (electron-builder --dir)
        run: npm run pack:dir

