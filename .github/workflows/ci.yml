name: ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Check (lint + typecheck + tests + secrets)
        run: npm run check

