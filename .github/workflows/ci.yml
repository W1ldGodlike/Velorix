# CI: windows-latest (prepare + packaged smokes) + ubuntu-latest (linux --dir layout).
# macOS electron-builder — local/manual; see docs/ARCHITECTURE.md § Bundled engines и CI.
name: ci

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      FLUXALLOY_TRUSTED_HASHES_STRICT_UNKNOWN: '1'
      FLUXALLOY_TRUSTED_HASHES_REQUIRE_SHA256_HEX: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Electron (npm postinstall / vite)
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\electron\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache electron-builder (winCodeSign и др.)
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Cache Windows engines (bin/)
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-flux-engines-${{ hashFiles('scripts/prepare-engines-win.mjs', 'scripts/run-prepare-engines-force.mjs', 'scripts/engines-exe-version-line.mjs', 'scripts/verify-bundled-engines-hashes.mjs', 'scripts/report-bundled-engines-hashes.mjs', 'Data/trusted_hashes.json') }}
          restore-keys: |
            ${{ runner.os }}-flux-engines-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      # Полный check; marathon check:quiet включает audit:structural (ф.8).
      # При изменении scripts/audit-scope.config.mjs — npm run audit:inventory + docs/audit-manifest.json.
      - name: Check (lint + typecheck + tests + secrets)
        run: npm run check

      - name: Test coverage (shared + main thresholds)
        run: npm run test:coverage

      - name: npm audit (moderate+)
        run: npm run audit:moderate

      - name: Prepare Windows engines (CI smoke)
        run: npm run engines:prepare:win

      - name: 'Verify bundled engines (doctor: verify + SHA + versions)'
        run: npm run engines:doctor

      - name: Build
        run: npm run build

      - name: Packaging smoke (electron-builder --dir)
        run: npm run pack:dir

      - name: Verify win-unpacked layout (§19)
        run: npm run verify:win-unpacked

      - name: Packaged app smoke (§19)
        run: npm run smoke:packaged-app

      - name: Packaged ffprobe smoke (§19)
        run: npm run smoke:packaged-ffprobe

      - name: Packaged ffmpeg smoke (§19)
        run: npm run smoke:packaged-ffmpeg

      - name: Packaged yt-dlp smoke (§19)
        run: npm run smoke:packaged-ytdlp

  linux-packaging:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FLUXALLOY_TRUSTED_HASHES_STRICT_UNKNOWN: '1'
      FLUXALLOY_TRUSTED_HASHES_REQUIRE_SHA256_HEX: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Quiet check (cross-platform, no Windows engines)
        run: npm run check:quiet

      - name: Build
        run: npm run build

      - name: Packaging smoke (electron-builder --linux --dir)
        run: npm run pack:linux:dir

      - name: Verify linux-unpacked layout (§19)
        run: npm run verify:linux-unpacked
