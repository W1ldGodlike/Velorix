<!doctype html>
<!--
  Корневой HTML renderer-процесса.
  Держим CSP максимально узкой: React-бандл и стили грузятся из собственного пакета,
  а внешние ссылки должны открываться через main process, не внутри этого окна.
-->
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAlloy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
